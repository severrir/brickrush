<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — BRICK RUSH</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="assets/img/logo.png" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <linearGradient id="ig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF2E6E"/><stop offset="0.5" stop-color="#7C5CFF"/><stop offset="1" stop-color="#2BD2FF"/>
    </linearGradient>
  </defs></svg>

  <main class="login-page">
    <a class="login-page__back" href="index.html">← Back home</a>

    <div class="auth-card" id="auth-card">
      <img class="auth-card__logo" src="assets/img/logo.png" alt="BRICK RUSH" />
      <h1>Log in to Brick Rush</h1>
      <p class="sub">Use Discord to apply and track your application. No passwords, no sign-up forms.</p>

      <button class="btn btn--discord btn--block" id="discord-login" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.3 4.4A19.8 19.8 0 0 0 15.4 3l-.2.4a18 18 0 0 1 4.3 1.4 13.3 13.3 0 0 0-15 0A18 18 0 0 1 8.8 3.4L8.6 3a19.8 19.8 0 0 0-4.9 1.4C1 9.3.3 14.1.6 18.8a20 20 0 0 0 6 3l.5-.8c-.8-.3-1.6-.7-2.3-1.2l.6-.4a14.3 14.3 0 0 0 12.2 0l.6.4c-.7.5-1.5.9-2.3 1.2l.5.8a20 20 0 0 0 6-3c.4-5.3-.6-10.1-2.6-14.4ZM8.7 15.6c-1.1 0-2.1-1.1-2.1-2.4 0-1.3 1-2.4 2.1-2.4 1.2 0 2.2 1.1 2.1 2.4 0 1.3-1 2.4-2.1 2.4Zm6.6 0c-1.1 0-2.1-1.1-2.1-2.4 0-1.3 1-2.4 2.1-2.4 1.2 0 2.2 1.1 2.1 2.4 0 1.3-.9 2.4-2.1 2.4Z"/></svg>
        Continue with Discord
      </button>

      <div class="auth-card__rule">What you get</div>
      <div class="auth-card__perks">
        <div class="auth-card__perk"><svg class="ico" viewBox="0 0 24 24"><path d="M5 12l4 4 10-10"/></svg> Apply to the founding team in minutes</div>
        <div class="auth-card__perk"><svg class="ico" viewBox="0 0 24 24"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg> Track your status: pending, accepted, rejected</div>
        <div class="auth-card__perk"><svg class="ico" viewBox="0 0 24 24"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3Z"/><path d="M12 12v9M4 7.5l8 4.5 8-4.5"/></svg> Verified identity so we know it's really you</div>
      </div>

      <p class="auth-card__demo" id="demo-note"></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/sound.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
