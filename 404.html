<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — BRICK RUSH</title>
  <link rel="icon" href="assets/img/logo.png" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <style>
    .nf { min-height: 100svh; display: grid; place-items: center; text-align: center; padding: 2rem; }
    .nf__glitch { font-family: var(--font-display); font-weight: 800; font-size: clamp(5rem, 24vw, 14rem);
      line-height: 0.9; position: relative; letter-spacing: -0.03em; }
    .nf__glitch span { position: absolute; inset: 0; }
    .nf__glitch span:nth-child(1) { color: var(--magenta); animation: glitch 2.2s infinite; clip-path: inset(0 0 55% 0); }
    .nf__glitch span:nth-child(2) { color: var(--cyan); animation: glitch 1.7s infinite reverse; clip-path: inset(55% 0 0 0); }
    .nf__glitch b { color: var(--text); position: relative; }
    @keyframes glitch { 0%,100% { transform: translate(0); } 20% { transform: translate(-4px, 2px); }
      40% { transform: translate(4px, -2px); } 60% { transform: translate(-2px, -1px); } 80% { transform: translate(2px, 1px); } }
    .nf__missing { display: inline-flex; gap: 6px; margin: 1.5rem 0; }
    .nf__missing i { width: 26px; height: 26px; border-radius: 4px; background: var(--surface-2);
      border: 1px solid var(--line-strong); display: inline-block; }
    .nf__missing i.gone { background: transparent; border-style: dashed; border-color: var(--magenta); animation: blink 1.4s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }
    .nf p { color: var(--text-muted); max-width: 40ch; margin: 0 auto 2rem; }
  </style>
</head>
<body>
  <main class="nf">
    <div>
      <div class="nf__glitch"><span>404</span><span>404</span><b>404</b></div>
      <div class="nf__missing"><i></i><i></i><i class="gone"></i><i></i><i></i></div>
      <h2 class="h-2">This brick is missing.</h2>
      <p>The page you’re looking for didn’t make it into the build. Let’s get you back to solid ground.</p>
      <div class="hero__actions" style="justify-content:center">
        <a class="btn btn--primary btn--lg" href="index.html">← Back home</a>
        <a class="btn btn--ghost btn--lg" href="apply.html">Apply instead</a>
      </div>
    </div>
  </main>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/sound.js"></script>
  <script src="assets/js/ui.js"></script>
</body>
</html>
